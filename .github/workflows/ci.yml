name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    env:
      PRIVATE_KEY: "1"
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - run: forge --version
      - run: forge fmt --check
      - run: forge build --sizes
      # These tests run without external RPC access. The three ETFTrading
      # integration tests are documented separately and require a Sepolia fork.
      - run: forge test -vvv --no-match-test "testETFTokens|testInvestWithToken|testRedeemToToken"

  repository:
    name: Repository consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: node scripts/check-abi-sync.mjs
